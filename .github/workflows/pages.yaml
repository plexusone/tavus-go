name: Deploy API Docs to Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'docs/**'
      - 'openapi/**'
      - '.github/workflows/pages.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Sync OpenAPI spec to docs
        run: cp openapi/openapi.yaml docs/openapi.yaml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './docs'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
